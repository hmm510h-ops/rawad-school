<!DOCTYPE html>
<html lang="ar" dir="rtl" style="height:100%;margin:0;padding:0">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>نظام الغياب - مدرسة الرواد</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,Arial,sans-serif;background:#f1f5f9;direction:rtl;font-size:13px;color:#1e293b;margin:0;overflow-x:hidden}
.layout{display:flex;min-height:100vh;width:100vw;overflow-x:hidden}
/* SIDEBAR */
.side{width:155px;background:#0f172a;flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;overflow-y:auto;z-index:100}
.logo{padding:16px 12px;text-align:center;border-bottom:1px solid #1e293b}
.logo-icon{font-size:28px;line-height:1}
.logo h2{color:#f1f5f9;font-size:11px;margin-top:4px;font-weight:700}
.logo p{color:#64748b;font-size:10px;margin-top:2px}
.nb{display:flex;align-items:center;gap:6px;padding:9px 10px;color:#94a3b8;background:none;border:none;
    width:100%;text-align:right;font-family:Tahoma;font-size:11px;cursor:pointer;border-right:3px solid transparent}
.nb:hover{background:#1e293b;color:#e2e8f0}
.nb.on{background:#1e40af;color:#fff;border-right-color:#60a5fa}
.sf{margin-top:auto;padding:10px 12px;font-size:10px;color:#475569;text-align:center;border-top:1px solid #1e293b}
/* MAIN */
.main{margin-right:155px;padding:14px 16px;min-height:100vh;width:calc(100vw - 155px)}
/* CARDS */
.card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card-title{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f1f5f9}
/* PAGE */
.page-title{font-size:18px;font-weight:700;color:#1e293b;margin-bottom:4px}
.page-sub{font-size:12px;color:#64748b;margin-bottom:16px}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;width:100%}
.stat{border-radius:10px;padding:14px 10px;text-align:center}
.stat .sn{font-size:28px;font-weight:700;line-height:1}.stat .sl{font-size:11px;margin-top:4px}
.s-blue{background:#eff6ff;color:#1d4ed8}.s-red{background:#fef2f2;color:#b91c1c}.s-yellow{background:#fefce8;color:#854d0e}
.s-green{background:#f0fdf4;color:#15803d}.s-amber{background:#fffbeb;color:#92400e}
/* 2 COL */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;width:100%}
/* ALERT BOX */
.abox{border-radius:10px;padding:12px;max-height:250px;overflow-y:auto}
.abox h3{font-size:11px;font-weight:700;margin-bottom:8px;position:sticky;top:0;padding:4px 0 6px}
.abox-warn{background:#fffbeb}.abox-warn h3{color:#92400e;background:#fffbeb}
.abox-red{background:#fef2f2}.abox-red h3{color:#b91c1c;background:#fef2f2}
.abox-green{background:#f0fdf4}.abox-green h3{color:#15803d;background:#f0fdf4}
.abox-pink{background:#fff1f2}.abox-pink h3{color:#be123c;background:#fff1f2}
.ai{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:0.5px solid rgba(0,0,0,.06);cursor:pointer;font-size:11px;gap:4px}
.ai:hover{opacity:.7}.ai .ad{font-weight:700;white-space:nowrap}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border:none;border-radius:8px;
     font-size:12px;font-family:Tahoma;cursor:pointer;font-weight:600;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85}
.b-blue{background:#2563eb;color:#fff}.b-green{background:#16a34a;color:#fff}
.b-red{background:#dc2626;color:#fff}.b-gray{background:#6b7280;color:#fff}
.b-amber{background:#d97706;color:#fff}.b-sm{padding:4px 9px;font-size:11px}
/* TABLE */
.tw{overflow-x:auto;border-radius:8px;border:1px solid #e2e8f0}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8fafc;padding:8px 6px;font-weight:700;border-bottom:2px solid #e2e8f0;text-align:center;white-space:nowrap;position:sticky;top:0}
td{padding:7px 6px;border-bottom:1px solid #f1f5f9;text-align:center;vertical-align:middle}
tr:hover td{background:#fafafa}
/* BADGE */
.bdg{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700}
.bdg-r{background:#fef2f2;color:#b91c1c}.bdg-a{background:#fffbeb;color:#92400e}
.bdg-o{background:#fff7ed;color:#c2410c}.bdg-g{background:#f0fdf4;color:#15803d}
.bdg-b{background:#eff6ff;color:#1d4ed8}
/* SEARCH */
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-row input{flex:1;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:Tahoma;transition:border-color .2s}
.search-row input:focus{outline:none;border-color:#2563eb}
/* ATTENDANCE */
.att-head{display:grid;grid-template-columns:38px 1fr 56px 95px 90px;gap:4px;padding:9px 14px;
  background:#1e40af;color:#fff;font-size:11px;font-weight:700;border-radius:8px 8px 0 0;align-items:center}
.att-row{display:grid;grid-template-columns:38px 1fr 56px 95px 90px;gap:4px;padding:7px 14px;
  border-bottom:1px solid #f1f5f9;align-items:center;font-size:12px;transition:background .1s;cursor:default}
.att-row:hover{background:#f8fafc}.att-row.abs{background:#fff5f5}
.att-row input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#dc2626}
/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;color:#64748b;font-weight:600}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-family:Tahoma;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#2563eb}
/* MONTH TABLE */
.month-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.mtab{padding:6px 12px;border:1.5px solid #e2e8f0;border-radius:7px;background:#fff;cursor:pointer;font-size:11px;font-family:Tahoma;font-weight:600;transition:all .15s}
.mtab:hover,.mtab.on{background:#2563eb;color:#fff;border-color:#2563eb}
/* DAY CELL */
.dcell{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;margin:1px;border:1px solid #e2e8f0;transition:all .1s}
.dcell:hover{opacity:.8}
.dcell.ab{background:#fef2f2;color:#dc2626;border-color:#fecaca}
.dcell.pr{background:#f1f5f9;color:#94a3b8}
/* MODAL */
.ov{position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:14px;padding:24px;width:680px;max-width:100%;max-height:90vh;overflow-y:auto;direction:rtl;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-close{float:left;background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;line-height:1;padding:0}
/* PROFILE */
.prof-hdr{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;padding:18px;border-radius:10px;margin-bottom:14px}
.prof-hdr h2{font-size:16px;font-weight:700}
.prof-hdr p{font-size:11px;opacity:.8;margin-top:4px}
.prof-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.pstat{border-radius:8px;padding:10px;text-align:center}
.pstat .n{font-size:22px;font-weight:700}.pstat .l{font-size:10px;margin-top:2px}
.month-row{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-bottom:12px}
.mbox{text-align:center;background:#f8fafc;border-radius:6px;padding:7px 2px;border:1px solid #e2e8f0}
.mbox .mv{font-size:15px;font-weight:700}.mbox .mn{font-size:9px;color:#64748b;margin-top:2px}
/* DATES */
.dates-wrap{border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;max-height:200px;overflow-y:auto}
.date-month{padding:6px 12px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:700;color:#2563eb;position:sticky;top:0}
.date-days{padding:8px 12px;display:flex;flex-wrap:wrap;gap:4px;border-bottom:1px solid #f1f5f9}
/* CONTROLS */
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px}
.ctrl-group{display:flex;flex-direction:column;gap:3px}
.ctrl-group label{font-size:11px;color:#64748b;font-weight:600}
.ctrl-group input[type=date],.ctrl-group select{padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-family:Tahoma;background:#fff}
.ctrl-group input[type=date]:focus,.ctrl-group select:focus{outline:none;border-color:#2563eb}
.info-bar{padding:9px 14px;background:#fef9c3;border:1px solid #fde68a;border-radius:8px;font-size:13px;margin-bottom:12px}
input[type=number]{-moz-appearance:textfield;padding:4px 6px;border:1.5px solid #e2e8f0;border-radius:6px;text-align:center;font-size:12px;font-family:Tahoma;width:60px}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]:focus{outline:none;border-color:#2563eb}
</style>

function normAr(s){
  if(!s) return '';
  return s
    .replace(/[أإآا]/g,'ا')
    .replace(/[يى]/g,'ي')
    .replace(/[هة]/g,'ه')
    .replace(/[ًٌٍَُِّْ]/g,'')
    .replace(/ +/g,'')
    .toLowerCase();
}
function matchAr(hay,needle){
  return normAr(hay).indexOf(normAr(needle))>=0;
}

function fbSyncAll(){

var DIFF_KEYS=["dates","med","parent","phone","oct","nov","dec","jan","feb","mar","apr","may","med_notes"];
function saveDiff(){
  if(!_S)return;
  var diff={};
  for(var i=0;i<_S.length;i++){
    var s=_S[i],seed=SEED[i];
    if(!seed||seed.id!==s.id)continue;
    var d={};
    for(var k=0;k<DIFF_KEYS.length;k++){
      var key=DIFF_KEYS[k];
      if(JSON.stringify(s[key])!==JSON.stringify(seed[key]))d[key]=s[key];
    }
    if(Object.keys(d).length)diff[s.id]=d;
  }
  try{lsSet("rw_diff",diff);}catch(e){}

}
function loadDiff(){
  var base=JSON.parse(JSON.stringify(SEED));
  var diff={};
  try{diff=lsGet("rw_diff")||{};}catch(e){}
  for(var i=0;i<base.length;i++){
    var d=diff[base[i].id];
    if(d){for(var k=0;k<DIFF_KEYS.length;k++){var key=DIFF_KEYS[k];if(d[key]!==undefined)base[i][key]=d[key];}}
  }
  return base;
}
function gS(){
  if(_S)return _S;
  _S=loadDiff();
  return _S;
}
var _HIST=[];
function wS(a){
  // احفظ الحالة السابقة في الـ history (آخر 10 خطوات)
  if(_S)_HIST.push(JSON.parse(JSON.stringify(_S)));
  if(_HIST.length>10)_HIST.shift();
  _S=a;saveDiff();setSS("محفوظ","#22c55e");
  // تحديث زر undo
  var ub=document.getElementById("UNDOBTN");

}
function undoLast(){

}

var _NOTIFIED=null;

function addNotified(id){var n=gNotified();if(n.indexOf(id)<0)n.push(id);_NOTIFIED=n;lsSet("rw_notified",n);}
function markNotified(id){
  if(!canDo('notify_whatsapp'))return;
  var _s=gS().find(function(x){return x.id===id;});
  addLog(getCurrentUserName(),"تبليغ واتساب",_s?_s.name:"—","");
  addNotified(id);
  // إضافة إنذار تلقائي
  var S=gS(),s=S.find(function(x){return x.id===id;});if(!s)return;
  var W=gW(),dates=(s.dates||[]).slice().sort();
  var already=W.find(function(w){return w.sid===id&&w.type==="غياب";});
  if(!already){
    W.unshift({id:nid(W),sid:id,type:"غياب",
      from:dates[0]||"",to:dates[dates.length-1]||"",
      notified:true,status:"قيد المتابعة"});
    wW(W);
  }
  rnd();
}

function tot(s){var t=0;for(var i=0;i<MK.length;i++)t+=(s[MK[i]]||0);return t;}
function nt(s){return Math.max(0,tot(s)-(s.med||0));}
function stBdg(n){
  if(n>=30)return{l:"🔴 إنذار",c:"bdg-r"};
  if(n>=23)return{l:"🟡 تحذير",c:"bdg-a"};
  if(n>=10)return{l:"🟠 متابعة",c:"bdg-o"};
  return{l:"✅ ممتاز",c:"bdg-g"};
}
function dn(d){var dt=new Date(d);return DA[dt.getDay()===0?6:dt.getDay()-1];}
function fd(d){if(!d)return"";var dt=new Date(d);return dt.getDate()+"/"+(dt.getMonth()+1)+"/"+dt.getFullYear();}
function td(){return new Date().toISOString().slice(0,10);}
function p2(n){return n<10?"0"+n:""+n;}
function nid(a){return a.length?Math.max.apply(null,a.map(function(x){return x.id||0}))+1:1;}
function esc(s){return String(s).replace(/'/g,"&#39;");}

    var S=gS(),s=S.find(function(x){return x.id===id;});if(!s)return;

function startScanCamera(){
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment", width: {ideal:1280}, height: {ideal:720} }
  }).then(function(stream){
    _scanStream = stream;
    var video = document.getElementById("SCAN_VIDEO");
    if(video){ video.srcObject = stream; video.play(); }
    // Load Tesseract and start scanning
    loadTesseractAndScan();
  }).catch(function(e){
    alert("❌ تعذر فتح الكاميرا: " + e.message);
    closeScanAttendance();
  });
}

function loadTesseractAndScan(){
  if(window.Tesseract){
    startFrameScan();
    return;
  }
  var script = document.createElement("script");
  script.src = "https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js";
  script.onload = function(){ startFrameScan(); };
  script.onerror = function(){ alert("❌ فشل تحميل مكتبة القراءة"); };
  document.head.appendChild(script);
}

function startFrameScan(){
  if(!_scanActive) return;
  _scanTimer = setInterval(function(){
    if(!_scanActive || _scanProcessing) return;
    captureAndRead();
  }, 1200); // Faster scanning - 1.2 seconds
}

function captureAndRead(){
  var video = document.getElementById("SCAN_VIDEO");
  if(!video || !video.videoWidth) return;
  _scanProcessing = true;

  var canvas = document.createElement("canvas");
  var vw = video.videoWidth, vh = video.videoHeight;
  // Crop top area where the name is (الاسم في الجزء العلوي)
  var cropY = Math.floor(vh * 0.05);
  var cropH = Math.floor(vh * 0.45);
  canvas.width = vw;
  canvas.height = cropH;
  var ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, cropY, vw, cropH, 0, 0, vw, cropH);

  // Enhanced processing: white text on blue background
  var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  var data = imgData.data;
  for(var i=0; i<data.length; i+=4){
    var r=data[i], g=data[i+1], b=data[i+2];
    // Detect white text (high RGB values)
    var isWhite = r>185 && g>185 && b>185;
    // High contrast: pure white or pure black
    data[i]=data[i+1]=data[i+2]= isWhite ? 255 : 0;
  }
  ctx.putImageData(imgData, 0, 0);

  // Scale up x4 for maximum accuracy
  var scaled = document.createElement("canvas");
  scaled.width = canvas.width * 4;
  scaled.height = canvas.height * 4;
  var sctx = scaled.getContext("2d");
  sctx.imageSmoothingEnabled = false;
  sctx.drawImage(canvas, 0, 0, scaled.width, scaled.height);

  Tesseract.recognize(scaled, 'ara', {
    logger: function(){},
    tessedit_pageseg_mode: '6',
    preserve_interword_spaces: '1',
    tessedit_char_whitelist: 'ابتثجحخدذرزسشصضطظعغفقكلمنهويىأإآءةئؤ '
  })
  .then(function(result){
    var text = result.data.text.trim();
    
    // Clean: remove label words and numbers
    var cleaned = text
      .replace(/الاسم\s*[:：]?/gi, '')
      .replace(/الفرق[ةه]\s*[:：]?/gi, '')
      .replace(/العام\s*الدراسي\s*[:：]?/gi, '')
      .replace(/الرقم\s*القومي\s*[:：]?/gi, '')
      .replace(/مدرسة\s*الرواد\s*/gi, '')
      .replace(/[0-9٠-٩\-_\/\|\(\)\[\]]/g, '')
      .replace(/\s+/g, ' ')
      .trim();

    if(cleaned.length >= 4){
      processNameScanResult(cleaned);
    } else {
      // Show what was read but keep scanning
      showScanFeedback("⏳", "قراءة غير واضحة", "أعد تثبيت الكارنيه", "#f59e0b", 1500);
      _scanProcessing = false;
    }
  }).catch(function(){
    _scanProcessing = false;
  });
}

function normArabicName(s){
  return (s||"")
    .replace(/أ|إ|آ/g,"ا")
    .replace(/ة/g,"ه")
    .replace(/ى/g,"ي")
    .replace(/ؤ/g,"و")
    .replace(/ئ/g,"ي")
    .replace(/\s+/g," ")
    .trim()
    .toLowerCase();
}

function processNameScanResult(scannedName){
  var S = gS();
  var norm = normArabicName(scannedName);
  var words = norm.split(" ").filter(function(w){ return w.length >= 2; });

  // Score each student by matching words
  var scored = S.map(function(s){
    var sName = normArabicName(s.name);
    var sWords = sName.split(" ");
    var score = 0;
    
    // Exact word matches
    words.forEach(function(w){
      if(sWords.indexOf(w) >= 0) score += 3;
      else if(sName.indexOf(w) >= 0) score += 2; // Partial match
    });
    
    // Bonus for matching first name or last name
    if(words.length > 0 && sWords.length > 0){
      if(words[0] === sWords[0]) score += 5; // First name match
      if(words.length > 1 && sWords.length > 1 && words[words.length-1] === sWords[sWords.length-1]) score += 3; // Last name match
    }
    
    return {s:s, score:score};
  }).filter(function(x){ return x.score > 0; });

  scored.sort(function(a,b){ return b.score - a.score; });

  if(!scored.length){
    // No match - show what was read and keep card visible
    var overlay = document.getElementById("SCAN_RESULT_OVERLAY");
    if(!overlay) return;
    overlay.style.display = "flex";
    overlay.innerHTML =
      "<div style='background:#1e293b;border-radius:14px;padding:20px;width:90%;max-width:380px;text-align:center;direction:rtl;'>" +
      "<div style='font-size:48px;margin-bottom:12px'>❌</div>" +
      "<div style='color:#f1f5f9;font-size:16px;font-weight:700;margin-bottom:8px'>لم يُعثر على مطابقة</div>" +
      "<div style='color:#94a3b8;font-size:12px;margin-bottom:6px'>الاسم المقروء:</div>" +
      "<div style='color:#60a5fa;font-size:15px;font-weight:600;margin-bottom:16px'>"+scannedName+"</div>" +
      "<button onclick='rejectScan()' style='width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:Tahoma'>🔄 أعد المسح</button>" +
      "</div>";
    return;
  }

  // If top match is significantly better
  var top = scored[0];
  var second = scored[1];
  if(!second || top.score >= (second.score * 1.5)){
    // One clear winner
    confirmScanStudent(top.s);
  } else {
    // Multiple close matches - show selection (max 4)
    showScanChoices(scored.slice(0, Math.min(4, scored.length)));
  }
}

function showScanChoices(list){
  var overlay = document.getElementById("SCAN_RESULT_OVERLAY");

  var h = "<div style='color:#f59e0b;font-size:15px;font-weight:700;margin-bottom:10px'>اختر الطالب الصح</div>";
  list.forEach(function(item){

function processScanResult(nid){
  var S = gS();
  var student = S.find(function(s){
    return (s.national_id||"").replace(/[^0-9]/g,"") === nid;
  });

  if(!student){
    _scanProcessing = false;
    showScanFeedback("❌", "لم يُعثر على الطالب", "أعد المسح", "#dc2626");
    return;
  }

  // Already scanned?
  if(_scanPresent[student.id]){
    _scanProcessing = false;
    showScanFeedback("✅", student.name, "تم تسجيله حاضراً مسبقاً", "#f59e0b");
    return;
  }

  // Mark present
  _scanPresent[student.id] = true;
  _scanLastId = student.id;

  // Update undo button
  var undoBtn = document.getElementById("SCAN_UNDO_BTN");
  if(undoBtn){ undoBtn.disabled = false; undoBtn.style.opacity="1"; }

  // Update count
  var countEl = document.getElementById("SCAN_COUNT");
  if(countEl) countEl.textContent = "حاضر: " + Object.keys(_scanPresent).length;

  // Show success for 5 seconds then continue
  var n = nt(student);
  var statusColor = n>=30?"#ef4444":n>=23?"#f59e0b":"#16a34a";
  showScanFeedback("✅", student.name, "الفصل: "+student.class_+" | غياب فعلي: "+n+" يوم", "#16a34a", 5000);
}

function showScanFeedback(icon, title, sub, color, duration){
  var overlay = document.getElementById("SCAN_RESULT_OVERLAY");
  if(!overlay) return;
  overlay.style.display = "flex";
  overlay.innerHTML =
    "<div style='font-size:56px;'>"+icon+"</div>"+
    "<div style='color:"+color+";font-size:18px;font-weight:700;text-align:center;padding:0 20px;'>"+title+"</div>"+
    "<div style='color:#94a3b8;font-size:13px;text-align:center;padding:0 20px;'>"+sub+"</div>";

  var dur = duration || 2000;
  setTimeout(function(){
    if(overlay) overlay.style.display = "none";
    _scanProcessing = false;
  }, dur);
}

function undoLastScan(){

function saveScanAttendance(){
  if(!canDo('edit_absence')) return;
  var presentIds = Object.keys(_scanPresent).map(Number);
  if(!presentIds.length){
    if(!confirm("لم يتم مسح أي كارنيه — هل تريد تسجيل الكل غياب؟")) return;
  }

  var S = gS();
  var today = AD;
  var mo = parseInt(today.slice(5,7)), yr = parseInt(today.slice(0,4));
  var mk2 = Object.keys(MV).find(function(k){ return MV[k]===mo; });
  var absentStudents = [];

  S.forEach(function(s){
    s.dates = s.dates || [];
    if(presentIds.indexOf(s.id) >= 0){
      // حاضر — شيل الغياب لو موجود
      s.dates = s.dates.filter(function(d){ return d !== today; });
    } else {
      // غايب — سجل غياب
      if(s.dates.indexOf(today) < 0){
        s.dates.push(today);
        absentStudents.push(s);
      }
    }
    if(mk2) s[mk2] = s.dates.filter(function(d){
      return parseInt(d.slice(5,7))===mo && parseInt(d.slice(0,4))===yr;
    }).length;
  });

  wS(S);
  addLog(getCurrentUserName(), "حفظ غياب يومي (مسح كارنيه)", "الكل",
    "اليوم: "+fd(today)+" | حاضر: "+presentIds.length+" | غايب: "+absentStudents.length);

  // Build absent report
  var report = "✅ تم حفظ الغياب بنجاح\n\n";
  report += "📅 التاريخ: " + fd(today) + "\n";
  report += "✅ حاضر: " + presentIds.length + " طالب\n";
  report += "❌ غايب: " + absentStudents.length + " طالب\n";

  if(absentStudents.length > 0){
    report += "\n--- الغايبون ---\n";
    // Group by class
    var byClass = {};
    absentStudents.forEach(function(s){
      if(!byClass[s.class_]) byClass[s.class_] = [];
      byClass[s.class_].push(s.name);
    });
    Object.keys(byClass).sort().forEach(function(cls){
      report += "\n" + cls + ":\n";
      byClass[cls].forEach(function(name){ report += "  • " + name + "\n"; });
    });
  }

  closeScanAttendance();
  alert(report);
  rnd();
}

function closeScanAttendance(){

  if(_scanStream){

    _scanStream = null;
  }
  _scanProcessing = false;
  var overlay = document.getElementById("SCAN_OVERLAY");
  if(overlay) overlay.remove();
}

function saveForm(id){
  if(!canDo('edit_students'))return;
  var nm=document.getElementById("FN").value.trim();
  if(!nm){alert("الاسم مطلوب");return;}
  var S=gS(),mo={};
  MK.forEach(function(mk,i){mo[mk]=Math.max(0,parseInt(document.getElementById("FM"+i).value)||0);});
  if(id){
    var i=S.findIndex(function(s){return s.id===id;});
    if(i>-1){
      var nidVal=document.getElementById("FNID")?document.getElementById("FNID").value:"";
      // سجّل التغييرات قبل الحفظ
      (function(){
        var changes=[];
        var _s=S[i];
        var newName=nm;
        var newCls=document.getElementById("FC")?document.getElementById("FC").value:_s.class_;
        var newPhone=document.getElementById("FPH")?document.getElementById("FPH").value:(_s.phone||"");
        var newParent=document.getElementById("FP")?document.getElementById("FP").value:(_s.parent||"");
        var newAddr=document.getElementById("FADR")?document.getElementById("FADR").value:(_s.address||"");
        var newMed=Math.max(0,parseInt(document.getElementById("FM").value)||0);
        if(newName!==_s.name)changes.push("الاسم: "+_s.name+" ← "+newName);
        if(newCls!==_s.class_)changes.push("الفصل: "+_s.class_+" ← "+newCls);
        if(newPhone!==(_s.phone||""))changes.push("الهاتف: "+(_s.phone||"—")+" ← "+newPhone);
        if(newParent!==(_s.parent||""))changes.push("ولي الأمر: "+(_s.parent||"—")+" ← "+newParent);
        if(newAddr!==(_s.address||""))changes.push("العنوان: "+(_s.address||"—")+" ← "+newAddr);
        if(newMed!==(_s.med||0))changes.push("الخصم الطبي: "+(_s.med||0)+" ← "+newMed);
        MK.forEach(function(mk,mi){
          var newMV=Math.max(0,parseInt(document.getElementById("FM"+mi).value)||0);
          var oldMV=_s[mk]||0;
          if(newMV!==oldMV)changes.push(MN[mi]+": "+oldMV+" ← "+newMV);
        });
        var det=changes.length?changes.join(" | "):"تعديل بيانات (بدون تغيير)";
        addLog(getCurrentUserName(),"تعديل بيانات طالب",_s.name,det);
      })();
      S[i]=Object.assign({},S[i],{name:nm,class_:document.getElementById("FC").value,
        parent:document.getElementById("FP")?document.getElementById("FP").value:S[i].parent,
        phone:document.getElementById("FPH")?document.getElementById("FPH").value:S[i].phone,
        address:document.getElementById("FADR")?document.getElementById("FADR").value:S[i].address,
        national_id:nidVal||S[i].national_id,
        dob:document.getElementById("FDOB")?document.getElementById("FDOB").value:S[i].dob,
        med:Math.max(0,parseInt(document.getElementById("FM").value)||0)},mo);
    }
  } else {
    var obj={id:nid(S),name:nm,class_:document.getElementById("FC").value,
      parent:document.getElementById("FP").value,phone:document.getElementById("FPH").value,
      med:Math.max(0,parseInt(document.getElementById("FM").value)||0),dates:[],med_notes:{}};
    MK.forEach(function(mk,i){obj[mk]=Math.max(0,parseInt(document.getElementById("FM"+i).value)||0);});
    S.push(obj);
    addLog("admin","إضافة طالب جديد",nm,"الفصل: "+document.getElementById("FC").value);
  }
  wS(S);closeM();rnd();
}

// ══════════ WARNINGS ══════════
function pgWarn(){
  var W=gW(),S=gS();

  // الطلاب الذين وصلوا 30 يوم ولم يصدر لهم إنذار بعد
  var warnedIds=W.filter(function(w){return w.type==="غياب";}).map(function(w){return w.sid;});
  var needWarn=S.filter(function(s){return nt(s)>=30 && warnedIds.indexOf(s.id)<0;})
               .sort(function(a,b){return nt(b)-nt(a);});

  var h="<div class='page-title'>الإنذارات</div><div class='page-sub'>إدارة إنذارات الغياب والسلوك</div>";

  // ── قسم: يستحقون إنذار ──
  if(needWarn.length){
    h+="<div class='card' style='border:2px solid #fecaca;background:#fff5f5'>";
    h+="<div class='card-title' style='color:#dc2626'>🔴 يستحقون إنذار غياب ("+needWarn.length+" طالب — 30 يوم فأكثر)</div>";
    h+="<div style='display:flex;flex-direction:column;gap:6px'>";
    needWarn.forEach(function(s){
      var dates=(s.dates||[]).slice().sort();
      var frm=dates[0]||"",to=dates[dates.length-1]||"";

      h+="<div style='flex:1'>";
      h+="<span style='font-weight:700;cursor:pointer' onclick='oProf("+s.id+")'>"+s.name+"</span>";
      h+=" <span style='font-size:11px;color:#64748b'>("+s.class_+")</span>";
      h+="<span style='background:#fee2e2;color:#dc2626;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;margin-right:8px'>"+nt(s)+" يوم</span>";
      h+="</div>";
      h+="<button class='btn b-red b-sm' onclick='issueWarn("+s.id+")'>📄 إصدار إنذار</button>";
      h+="</div>";
    });
    h+="</div></div>";
  } else {
    h+="<div class='card' style='background:#f0fdf4;border:1px solid #bbf7d0;text-align:center;padding:14px'>";
    h+="<span style='color:#15803d;font-weight:700'>✅ لا يوجد طلاب يستحقون إنذار حالياً</span></div>";
  }

  // ── قسم: الإنذارات المسجلة ──
  h+="<div class='card' style='margin-top:14px'>";
  h+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px'>";
  h+="<div class='card-title' style='margin-bottom:0'>سجل الإنذارات ("+W.length+")</div>";
  h+="<button class='btn b-sm' style='background:#f1f5f9;color:#475569' onclick='oWarnForm()'>➕ إضافة يدوي</button></div>";
  if(!W.length){
    h+="<div style='text-align:center;padding:20px;color:#94a3b8'>لا توجد إنذارات مسجلة</div>";
  } else {
    h+="<div class='tw'><table>";
    h+="<thead><tr><th>م</th><th>الطالب</th><th>الفصل</th><th>النوع</th><th>من</th><th>إلى</th><th>استدعاء</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody>";
    W.forEach(function(w,i){
      var s=S.find(function(x){return x.id===w.sid;});if(!s)return;
      h+="<tr><td style='color:#94a3b8'>"+(i+1)+"</td>";
      h+="<td style='font-weight:600;text-align:right;cursor:pointer;min-width:140px' onclick='oProf("+s.id+")'>"+s.name+"</td>";
      h+="<td>"+s.class_+"</td>";
      h+="<td><span class='bdg "+(w.type==="تميز"?"bdg-g":w.type==="غياب"?"bdg-r":"bdg-a")+"'>"+w.type+"</span></td>";
      h+="<td style='font-size:11px'>"+(w.from||"—")+"</td><td style='font-size:11px'>"+(w.to||"—")+"</td>";
      h+="<td>"+(w.notified?"✅":"❌")+"</td>";
      h+="<td><span class='bdg "+(w.status==="تم الحل"?"bdg-g":"bdg-a")+"'>"+w.status+"</span></td>";
      h+="<td style='white-space:nowrap'>";
      if(w.type==="غياب")h+="<button class='btn b-red b-sm' onclick='issueWarn("+s.id+")'>📄 إنذار</button> ";
      h+="<button class='btn b-sm' style='background:#f1f5f9;color:#475569' onclick='delWarn("+w.id+")'>حذف</button></td></tr>";
    });
    h+="</tbody></table></div>";
  }
  h+="</div>";
  return h;
}

function getWarnData(id){
  var S=gS(),s=S.find(function(x){return x.id===id;});if(!s)return null;
  return {
    s:s,
    parentName:document.getElementById("WP_NAME").value,
    phone:document.getElementById("WP_PHONE").value,
    fromStr:document.getElementById("WP_FROM").value,
    toStr:document.getElementById("WP_TO").value,
    days:document.getElementById("WP_DAYS").value,
    class_:document.getElementById("WP_CLASS").value,
    note:document.getElementById("WP_NOTE").value
  };
}

// معاينة الإنذار في نافذة جديدة
function previewWarn(id){
  var d=getWarnData(id);if(!d)return;
  var s=d.s;
  var w=window.open("","_blank","width=850,height=700");if(!w){alert("يرجى السماح بالنوافذ المنبثقة");return;}
  var logoSrc=document.querySelector(".logo img")?document.querySelector(".logo img").src:"";
  var h=buildWarnHTML(d,logoSrc,true);
  w.document.write(h);w.document.close();
}

// تحميل Word (HTML→DOCX via Blob)
function downloadWarnDoc(id){
  if(!canDo('import_export'))return;
  var _dw=gS().find(function(x){return x.id===id;});
  addLog(getCurrentUserName(),'تحميل إنذار Word',_dw?_dw.name:'—','');
  var d=getWarnData(id);if(!d)return;
  var logoSrc=document.querySelector(".logo img")?document.querySelector(".logo img").src:"";
  var htmlContent=buildWarnHTML(d,logoSrc,false);
  // تحميل كـ HTML بامتداد .doc (يفتح في Word)
  var blob=new Blob(["﻿"+htmlContent],{type:"application/msword;charset=utf-8"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="انذار_غياب_"+d.s.name.replace(/ /g,"_")+".doc";
  a.click();
}

function filtW(){
  var q=(document.getElementById("WS")||{}).value||"";
  var S=gS().filter(function(s){return matchAr(s.name,q)||matchAr(s.class_,q);});
  var el=document.getElementById("WST");if(!el)return;
  el.innerHTML=S.slice(0,20).map(function(s){return"<option value='"+s.id+"'>"+s.name+" ("+s.class_+")</option>";}).join("");
}
function saveWarn(){
  var sel=document.getElementById("WST");if(!sel||!sel.value){alert("اختر طالباً أولاً");return;}
  var W=gW();
  W.unshift({id:nid(W),sid:parseInt(sel.value),type:document.getElementById("WT").value,
    from:document.getElementById("WF").value,to:document.getElementById("WTO").value,
    notified:document.getElementById("WN").checked,status:document.getElementById("WSTAT").value});
  var _sn=gS().find(function(x){return x.id===parseInt(sel.value);});
  addLog(getCurrentUserName(),"إضافة إنذار",_sn?_sn.name:"—","");

// ══════════ PRINT DAILY REPORT ══════════
function printDay(dateStr){
  var d=dateStr||AD,S=gS();
  function getAb(cls){return S.filter(function(s){return s.class_===cls&&(s.dates||[]).indexOf(d)>=0;});}
  function getCnt(cls){return S.filter(function(s){return s.class_===cls;}).length;}
  var totG=S.filter(function(s){return s.class_.indexOf("فتيات")>=0;}).length;
  var totB=S.filter(function(s){return s.class_.indexOf("بنين")>=0;}).length;
  var absG=S.filter(function(s){return s.class_.indexOf("فتيات")>=0&&(s.dates||[]).indexOf(d)>=0;}).length;
  var absB=S.filter(function(s){return s.class_.indexOf("بنين")>=0&&(s.dates||[]).indexOf(d)>=0;}).length;

  function buildTable(classes){
    var perRow=4,out="";
    for(var ci=0;ci<classes.length;ci+=perRow){
      var chunk=classes.slice(ci,ci+perRow);
      out+="<table border='1' style='width:100%;border-collapse:collapse;font-size:12px;margin:6px 0'>";
      out+="<tr style='background:#d0d0d0'><th>م</th><th>البيان</th>";
      chunk.forEach(function(c){out+="<th>"+c+"</th>";});
      out+="</tr>";
      out+="<tr><td></td><td>القيد</td>";
      chunk.forEach(function(c){out+="<td style='text-align:center'>"+getCnt(c)+"</td>";});
      out+="</tr><tr><td></td><td>الحضور</td>";
      chunk.forEach(function(c){out+="<td style='text-align:center'>"+(getCnt(c)-getAb(c).length)+"</td>";});
      out+="</tr><tr><td></td><td style='color:red;font-weight:700'>الغياب</td>";
      chunk.forEach(function(c){out+="<td style='text-align:center;color:red;font-weight:700'>"+getAb(c).length+"</td>";});
      out+="</tr>";
      var maxR=Math.max.apply(null,chunk.map(function(c){return getAb(c).length;}).concat([0]));
      for(var ri=0;ri<Math.max(maxR,1);ri++){
        out+="<tr><td style='text-align:center;color:#666'>"+(ri+1)+"</td><td></td>";
        chunk.forEach(function(c){var ab=getAb(c);out+="<td style='text-align:right;padding:3px 6px;font-size:11px'>"+(ab[ri]?ab[ri].name:"")+"</td>";});
        out+="</tr>";
      }
      out+="</table>";
    }
    return out;
  }

  var w=window.open("","_blank");if(!w){alert("يرجى السماح بالنوافذ المنبثقة");return;}
  var h="<!DOCTYPE html><html dir='rtl'><head><meta charset='UTF-8'><title>تقرير "+fd(d)+"</title>";
  h+="<style>body{font-family:Tahoma;padding:16px;font-size:13px;direction:rtl}";
  h+=".hd{text-align:center;margin-bottom:10px;line-height:2}h3{text-align:center;font-size:15px}h4{margin:12px 0 4px;color:#1d4ed8;font-size:13px}";
  h+="@media print{.np{display:none!important}}</style></head><body>";
  h+="<div class='hd'><p>وزارة الصحة والسكان — الإدارة العامة للتعليم الفني</p>";
  h+="<p><strong>مدرسة الرواد الثانوية الفنية للتمريض</strong></p>";
  h+="<h3>التقرير اليومي لحضور وغياب</h3>";
  h+="<p>يوم: <strong>"+dn(d)+"</strong> &nbsp;&nbsp; الموافق: <strong>"+fd(d)+"</strong></p></div>";
  h+="<table border='1' style='width:55%;border-collapse:collapse;margin:8px auto;font-size:13px'>";
  h+="<tr style='background:#d0d0d0;text-align:center'><th>النوع</th><th>القيد</th><th>الحضور</th><th>الغياب</th></tr>";
  h+="<tr><td style='text-align:center'>بنين</td><td style='text-align:center'>"+totB+"</td><td style='text-align:center'>"+(totB-absB)+"</td><td style='text-align:center;color:red;font-weight:700'>"+absB+"</td></tr>";
  h+="<tr><td style='text-align:center'>فتيات</td><td style='text-align:center'>"+totG+"</td><td style='text-align:center'>"+(totG-absG)+"</td><td style='text-align:center;color:red;font-weight:700'>"+absG+"</td></tr>";
  h+="<tr style='font-weight:700;background:#f0f0f0'><td style='text-align:center'>الإجمالي</td><td style='text-align:center'>"+(totB+totG)+"</td><td style='text-align:center'>"+(totB+totG-absB-absG)+"</td><td style='text-align:center;color:red'>"+(absB+absG)+"</td></tr></table>";
  if(GIRLS_CLS.length){h+="<h4>غياب الفتيات</h4>"+buildTable(GIRLS_CLS);}
  if(BOYS_CLS.length){h+="<h4>غياب البنين</h4>"+buildTable(BOYS_CLS);}
  h+="<div style='display:flex;justify-content:space-around;margin-top:30px;padding-top:15px;border-top:1px solid #000'>";
  h+="<div style='text-align:center'>شئون طلاب<br><br>_______________</div>";
  h+="<div style='text-align:center'>وكيل المدرسة<br><br>_______________</div>";
  h+="<div style='text-align:center'>يعتمد مديرة المدرسة<br><br>_______________</div></div>";
  h+="<br><button class='np' onclick='window.print()' style='padding:10px 24px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;margin-top:10px'>🖨️ طباعة التقرير</button>";
  h+="</body></html>";
  w.document.write(h);w.document.close();
}

// ══════════ IMPORT EXCEL ══════════
function importSummary(input){
  if(!canDo('import_export'))return;
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:"array"});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      var S=gS();
      var updated=0,notFound=[];
      // find header row (has "أسماء التلاميذ")
      var hRow=-1;
      for(var ri=0;ri<rows.length;ri++){
        if(rows[ri]&&rows[ri].join&&rows[ri].join("").indexOf("أسماء")>=0){hRow=ri;break;}
      }
      if(hRow<0){alert("لم يتم العثور على صف الأعمدة في الملف");return;}
      var headers=rows[hRow];
      var nameCol=headers.indexOf("أسماء التلاميذ");
      var octCol=headers.indexOf("أكتوبر");
      var novCol=headers.indexOf("نوفمبر");
      var decCol=headers.indexOf("ديسمبر");
      var janCol=headers.indexOf("يناير");
      var febCol=headers.indexOf("فبراير");
      var marCol=headers.indexOf("مارس");
      var aprCol=headers.indexOf("ابريل")<0?headers.indexOf("أبريل"):headers.indexOf("ابريل");
      var mayCol=headers.indexOf("مايو");
      var medCol=headers.indexOf("خصم تقارير");
      if(nameCol<0){alert("عمود الأسماء غير موجود");return;}
      var colMap={oct:octCol,nov:novCol,dec:decCol,jan:janCol,feb:febCol,mar:marCol,apr:aprCol,may:mayCol};
      for(var ri=hRow+1;ri<rows.length;ri++){
        var row=rows[ri];
        if(!row||!row[nameCol])continue;
        var name=String(row[nameCol]).trim();
        if(!name||name==="أسماء التلاميذ")continue;
        var si=S.findIndex(function(s){return s.name.trim()===name||name.indexOf(s.name.trim())>=0||s.name.trim().indexOf(name)>=0;});
        if(si<0){notFound.push(name);continue;}
        Object.keys(colMap).forEach(function(mk){
          var col=colMap[mk];
          if(col>=0&&row[col]!==null&&row[col]!==undefined){
            var v=parseInt(row[col]);
            if(!isNaN(v)&&v>=0)S[si][mk]=v;
          }
        });
        if(medCol>=0&&row[medCol]!==null){
          var m=parseInt(row[medCol]);
          if(!isNaN(m)&&m>=0)S[si].med=m;
        }
        updated++;
      }
      wS(S);
      addLog(getCurrentUserName(),"استيراد غياب مجمع","كل الشهور","تم تحديث "+updated+" طالب");
      msg="✅ تم استيراد بيانات "+updated+" طالب بنجاح!";
      if(notFound.length)msg+="\n\n⚠️ لم يتم العثور على "+notFound.length+" طالب:\n"+notFound.slice(0,5).join("\n")+(notFound.length>5?"\n...":"");
      alert(msg);
      rnd();
    }catch(ex){alert("خطأ في قراءة الملف: "+ex.message);}
  };
  reader.readAsArrayBuffer(file);
  input.value="";
}

function importMonth(input,mn,yr){
  if(!canDo('import_export'))return;
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:"array"});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      var S=gS();
      var updated=0,notFound=[];
      // rows start from row 3 (index 2): col0=رقم, col1=اسم, col2=فصل, col3..33=أيام
      for(var ri=2;ri<rows.length;ri++){
        var row=rows[ri];
        if(!row||!row[1])continue;
        var name=String(row[1]).trim();
        if(!name)continue;
        var si=S.findIndex(function(s){return s.name.trim()===name||name.indexOf(s.name.trim())>=0||s.name.trim().indexOf(name)>=0;});
        if(si<0){notFound.push(name);continue;}
        // columns 3-33 = days 1-31
        var abdays=[];
        for(var ci=3;ci<=33;ci++){
          if(row[ci]==="غ"||row[ci]==="غ "||String(row[ci]||"").trim()==="غ"){
            abdays.push(ci-2); // day number
          }
        }
        // remove old dates for this month
        S[si].dates=S[si].dates||[];
        S[si].dates=S[si].dates.filter(function(d){return parseInt(d.slice(5,7))!==mn||parseInt(d.slice(0,4))!==yr;});
        // add new dates
        abdays.forEach(function(day){
          var ds=yr+"-"+(mn<10?"0"+mn:mn)+"-"+(day<10?"0"+day:day);
          S[si].dates.push(ds);
        });
        // update monthly count
        var mk2=Object.keys(MV).find(function(k){return MV[k]===mn;});
        if(mk2)S[si][mk2]=abdays.length;
        updated++;
      }
      wS(S);
      addLog(getCurrentUserName(),"استيراد غياب شهري","شهر "+mn+"/"+yr,"تم تحديث "+updated+" طالب");
      msg="✅ تم استيراد غياب "+updated+" طالب لشهر "+mn+"/"+yr;
      if(notFound.length)msg+="\n\n⚠️ لم يتم العثور على "+notFound.length+" طالب:\n"+notFound.slice(0,5).join("\n")+(notFound.length>5?"\n...":"");
      alert(msg);
      rnd();
    }catch(ex){alert("خطأ في قراءة الملف: "+ex.message);}
  };
  reader.readAsArrayBuffer(file);
  input.value="";
}

// ══════════ EXPORT MONTHLY XLSX ══════════
function exportMonthXls(monthNum, year){
  if(!canDo('import_export'))return;
  addLog(getCurrentUserName(),'تحميل Excel شهري','شهر '+monthNum+'/'+year,'');
  var S=gS();
  // days in month: new Date(year, monthNum, 0) = last day of month
  var dim=new Date(year, monthNum, 0).getDate();
  // JS getDay(): 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
  function isWknd(day){ var d=new Date(year,monthNum-1,day).getDay(); return d===5||d===6; }

  var thin={style:'thin'};
  var bdr={top:thin,bottom:thin,left:thin,right:thin};
  var RED='FFFF0000', PURPLE='FF7030A0';

  function cell(t,v){ return {t:t,v:v}; }
  function sty(fill,halign){
    var s={font:{name:'Calibri',sz:11},
           alignment:{horizontal:halign||'center',vertical:'center'},
           border:bdr};
    if(fill) s.fill={patternType:'solid',fgColor:{rgb:fill}};
    return s;
  }

  var wb=XLSX.utils.book_new();
  // Use sheet_add_aoa then style manually
  var ws={};

  // ── Row 1 (r=0): title ────────────────────────────────────────
  var title='حضور وغياب تلاميذ الفرقة:                                  فصل:                في شهر:    '+monthNum+'               سنة:    '+year+'            مسؤول الغياب:                          ';
  ws[XLSX.utils.encode_cell({r:0,c:0})]={t:'s',v:title,s:sty(null,'center')};
  // fill merged cells as null
  for(var mc=1;mc<34;mc++) ws[XLSX.utils.encode_cell({r:0,c:mc})]={t:'z',v:null};

  // ── Row 2 (r=1): headers ──────────────────────────────────────
  ws[XLSX.utils.encode_cell({r:1,c:0})]={t:'s',v:'عدد',s:sty(null,'center')};
  ws[XLSX.utils.encode_cell({r:1,c:1})]={t:'s',v:'أسماء التلاميذ',s:sty(null,'right')};
  ws[XLSX.utils.encode_cell({r:1,c:2})]={t:'s',v:'الفصل',s:sty(null,'center')};
  for(var d=1;d<=dim;d++){
    ws[XLSX.utils.encode_cell({r:1,c:2+d})]={t:'n',v:d,s:sty(null,'center')};
  }
  // مجموع header (col after last day)
  ws[XLSX.utils.encode_cell({r:1,c:3+dim})]={t:'s',v:'مجموع الغياب',s:sty(null,'center')};

  // ── Data rows (r=2+) ──────────────────────────────────────────
  S.forEach(function(s,si){
    var ri=si+2;
    // م
    ws[XLSX.utils.encode_cell({r:ri,c:0})]={t:'n',v:si+1,s:sty(null,'center')};
    // الاسم
    ws[XLSX.utils.encode_cell({r:ri,c:1})]={t:'s',v:s.name,s:sty(null,'right')};
    // الفصل
    ws[XLSX.utils.encode_cell({r:ri,c:2})]={t:'s',v:s.class_,s:sty(null,'center')};

    // collect absent days this month
    var absent={};
    (s.dates||[]).forEach(function(dt){
      var p=dt.split('-');
      if(parseInt(p[1])===monthNum&&parseInt(p[0])===year) absent[parseInt(p[2])]=true;
    });

    // day cells
    for(var d=1;d<=dim;d++){
      var isA=!!absent[d], isW=isWknd(d);
      var fill=isA?RED:(isW?PURPLE:null);
      var addr=XLSX.utils.encode_cell({r:ri,c:2+d});
      ws[addr]=isA?{t:'s',v:'غ',s:sty(fill,'center')}:{t:'z',v:null,s:sty(fill,'center')};
    }

    // COUNTIF: col = 3+dim (0-based), Excel row = ri+1
    var ds=XLSX.utils.encode_col(3)+(ri+1);
    var de=XLSX.utils.encode_col(2+dim)+(ri+1);
    var cnt=Object.keys(absent).length;
    ws[XLSX.utils.encode_cell({r:ri,c:3+dim})]={t:'n',v:cnt,f:'COUNTIF('+ds+':'+de+',"غ")',s:sty(null,'center')};
  });

  // ── Sheet settings ────────────────────────────────────────────
  ws['!ref']=XLSX.utils.encode_range({r:0,c:0},{r:S.length+1,c:3+dim});
  ws['!sheetViews']=[{rightToLeft:true}];
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:33}}]; // A1:AH1
  ws['!rows']=[{hpt:27.75},{hpt:14.25}];
  var wcols=[{wch:6.43},{wch:29.43},{wch:6.0}];
  for(var d2=0;d2<dim;d2++) wcols.push({wch:3.29});
  wcols.push({wch:11.29});
  ws['!cols']=wcols;

  XLSX.utils.book_append_sheet(wb,ws,'ورقة1');
  XLSX.writeFile(wb,'كشف_غياب_شهر_'+monthNum+'_'+year+'.xlsx',{cellStyles:true});
}

// ══════════ EXPORT SUMMARY XLSX ══════════
function exportSummaryXls(){
  if(!canDo('import_export'))return;
  addLog(getCurrentUserName(),'تحميل Excel مجمع','—','');
  var S=gS();
  var MK_=['oct','nov','dec','jan','feb','mar','apr','may'];
  var MN_=['أكتوبر','نوفمبر','ديسمبر','يناير','فبراير','مارس','ابريل','مايو'];

  var thin={style:'thin'};
  var bdr={top:thin,bottom:thin,left:thin,right:thin};
  function sty(halign){
    return {font:{name:'Calibri',sz:11},
            alignment:{horizontal:halign||'center',vertical:'center'},
            border:bdr};
  }

  var wb=XLSX.utils.book_new();
  var ws={};

  // ── Row 1 (r=0): BLANK like original ─────────────────────────
  // ── Row 2 (r=1): headers ──────────────────────────────────────
  // Col A (c=0) = empty (no border)
  var hdrs=[null,'أسماء التلاميذ','الفصل'].concat(MN_)
           .concat(['مجموع الغياب','خصم تقارير','الغياب الفعلي','ملاحظات']);
  hdrs.forEach(function(h,ci){
    var addr=XLSX.utils.encode_cell({r:1,c:ci});
    if(h===null){ ws[addr]={t:'z',v:null}; return; }
    ws[addr]={t:'s',v:h,s:sty('center')};
  });

  // ── Data rows from r=2 ────────────────────────────────────────
  S.forEach(function(s,si){
    var ri=si+2;
    ws[XLSX.utils.encode_cell({r:ri,c:0})]={t:'n',v:si+1,s:sty('center')};
    ws[XLSX.utils.encode_cell({r:ri,c:1})]={t:'s',v:s.name,s:sty('center')};
    ws[XLSX.utils.encode_cell({r:ri,c:2})]={t:'s',v:s.class_,s:sty('center')};
    MK_.forEach(function(mk,mi){
      ws[XLSX.utils.encode_cell({r:ri,c:3+mi})]={t:'n',v:s[mk]||0,s:sty('center')};
    });
    var rowN=ri+1;
    var tot=MK_.reduce(function(a,mk){return a+(s[mk]||0);},0);
    var med=s.med||0;
    // مجموع =SUM(D:K)
    ws[XLSX.utils.encode_cell({r:ri,c:11})]={t:'n',v:tot,f:'SUM(D'+rowN+':K'+rowN+')',s:sty('center')};
    // خصم
    ws[XLSX.utils.encode_cell({r:ri,c:12})]={t:'n',v:med,s:sty('right')};
    // فعلي =L-M
    ws[XLSX.utils.encode_cell({r:ri,c:13})]={t:'n',v:tot-med,f:'L'+rowN+'-M'+rowN,s:sty('center')};
    // ملاحظات
    ws[XLSX.utils.encode_cell({r:ri,c:14})]={t:'z',v:null};
  });

  // ── Sheet settings ────────────────────────────────────────────
  ws['!ref']=XLSX.utils.encode_range({r:0,c:0},{r:S.length+1,c:14});
  ws['!sheetViews']=[{rightToLeft:true}];
  ws['!rows']=[null,{hpt:14.25}];
  ws['!cols']=[
    {wch:6.43},{wch:29.43},{wch:6.29},
    {wch:7.86},{wch:9.57},{wch:7.86},{wch:7.86},{wch:7.86},{wch:7.86},{wch:7.86},{wch:7.86},
    {wch:14.29},{wch:14.29},{wch:18.0},{wch:29.14}
  ];

  XLSX.utils.book_append_sheet(wb,ws,'ورقة1');

function renderStatChart(){

  var boys=JSON.parse(canvas.getAttribute("data-boys")||"[]");
  var girls=JSON.parse(canvas.getAttribute("data-girls")||"[]");
  var total=JSON.parse(canvas.getAttribute("data-total")||"[]");

    ]},

function renderClsRank(){
  var sel=document.getElementById("CLS_RANK_SEL");
  var out=document.getElementById("CLS_RANK_OUT");
  if(!sel||!out)return;
  var cls=sel.value;
  var S=gS();
  var list=S.filter(function(s){return s.class_===cls;}).sort(function(a,b){return nt(b)-nt(a);});
  if(!list.length){out.innerHTML="<div style='color:#64748b;font-size:12px'>لا يوجد طلاب في هذا الفصل</div>";return;}
  var h="<div style='max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:4px'>";
  list.forEach(function(s,i){
    var n=nt(s);
    var color=n>=30?"#dc2626":n>=23?"#d97706":n>=10?"#c2410c":"#16a34a";
    var bg=n>=30?"#fef2f2":n>=23?"#fffbeb":n>=10?"#fff7ed":"#f0fdf4";
    var badge=n>=30?"🔴":n>=23?"🟡":n>=10?"🟠":"✅";
    h+="<div style='display:flex;align-items:center;gap:6px;font-size:11px;padding:6px 10px;background:"+bg+";border-radius:7px'>";
    h+="<span style='width:22px;text-align:center;font-weight:700;color:#94a3b8'>"+(i+1)+"</span>";
    h+="<span style='flex:1;font-weight:600;color:#1e293b;cursor:pointer' onclick='oProf("+s.id+")'>"+s.name+"</span>";
    h+="<span style='font-size:12px'>"+badge+"</span>";
    h+="<span style='font-weight:700;color:"+color+";min-width:50px;text-align:center'>"+n+" يوم</span>";
    if(s.med>0){h+="<span style='background:#dbeafe;color:#1d4ed8;padding:1px 6px;border-radius:10px;font-size:10px'>طبي: "+s.med+"</span>";}
    h+="</div>";
  });
  h+="</div>";
  // ملخص الفصل
  var totalN=list.reduce(function(a,s){return a+nt(s);},0);
  var avg=list.length?Math.round(totalN/list.length*10)/10:0;
  var reds=list.filter(function(s){return nt(s)>=30;}).length;
  h="<div style='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px'>"+
    "<span style='background:#eff6ff;color:#1d4ed8;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700'>"+list.length+" طالب</span>"+
    "<span style='background:#fef2f2;color:#b91c1c;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700'>إنذار: "+reds+"</span>"+
    "<span style='background:#f0fdf4;color:#15803d;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700'>متوسط غياب: "+avg+" يوم</span>"+
    "</div>"+h;
  out.innerHTML=h;
}

function doStudentSearch(){
  var nidVal = (document.getElementById("STU_NID").value || "").trim().replace(/[^0-9]/g,"");
  var resultDiv = document.getElementById("STU_RESULT");
  if(!nidVal){ resultDiv.innerHTML = "<div style='color:#ef4444;text-align:center;font-size:13px;padding:10px;'>أدخل الرقم القومي أولاً</div>"; return; }

  // تجاهل اللعب بأرقام قصيرة
  if(nidVal.length < 14){
    resultDiv.innerHTML = "<div style='color:#f59e0b;text-align:center;font-size:13px;padding:10px;'>الرقم القومي يجب أن يكون 14 رقماً</div>";
    return;
  }

  // فحص lockout للطلاب
  var STU_LOCK_KEY = "rw_stu_attempts";
  var now = Date.now();
  var LOCK_DUR = 5 * 60 * 1000;
  var MAX_ATT = 5;
  var stuAttempts;
  try{ stuAttempts = JSON.parse(localStorage.getItem(STU_LOCK_KEY)||"{}"); }catch(e){ stuAttempts={}; }

  if(stuAttempts.lockedUntil && now < stuAttempts.lockedUntil){
    var rem = Math.ceil((stuAttempts.lockedUntil - now)/1000/60);
    resultDiv.innerHTML = "<div style='background:#450a0a;border:1px solid #7f1d1d;border-radius:8px;padding:14px;text-align:center;color:#fca5a5;font-size:13px;margin-top:10px;'>🔒 محظور مؤقتاً لمدة "+rem+" دقيقة</div>";
    return;
  }
  if(stuAttempts.lockedUntil && now >= stuAttempts.lockedUntil){
    stuAttempts = {};
    localStorage.setItem(STU_LOCK_KEY, JSON.stringify(stuAttempts));
  }

  // Search in data
  var S = gS();
  var student = S.find(function(s){ return (s.national_id||"").replace(/[^0-9]/g,"") === nidVal; });

  if(!student){
    // سجل المحاولة الفاشلة
    stuAttempts.count = (stuAttempts.count||0) + 1;
    var device = getDeviceInfo();
    if(stuAttempts.count >= MAX_ATT){
      stuAttempts.lockedUntil = now + LOCK_DUR;
      addLog("زائر","⛔ بحث مشبوه متكرر","صفحة الطلاب",stuAttempts.count+" محاولة | آخر رقم: "+nidVal+" | "+device);
      resultDiv.innerHTML = "<div style='background:#450a0a;border:1px solid #7f1d1d;border-radius:8px;padding:14px;text-align:center;color:#fca5a5;font-size:13px;margin-top:10px;'>🔒 تم الحظر مؤقتاً بسبب محاولات متكررة</div>";
    } else {
      if(stuAttempts.count >= 3){
        addLog("زائر","⚠️ محاولة بحث فاشلة","صفحة الطلاب","المحاولة "+stuAttempts.count+" | رقم: "+nidVal+" | "+device);
      }
      resultDiv.innerHTML = "<div style='background:#450a0a;border:1px solid #7f1d1d;border-radius:8px;padding:14px;text-align:center;color:#fca5a5;font-size:13px;margin-top:10px;'>لم يتم العثور على بيانات بهذا الرقم القومي</div>";
    }
    localStorage.setItem(STU_LOCK_KEY, JSON.stringify(stuAttempts));
    return;
  }

  // نجاح — مسح المحاولات
  stuAttempts = {};
  localStorage.setItem(STU_LOCK_KEY, JSON.stringify(stuAttempts));

  // Build result
  var MN2 = ["أكتوبر","نوفمبر","ديسمبر","يناير","فبراير","مارس","أبريل","مايو"];
  var MK2 = ["oct","nov","dec","jan","feb","mar","apr","may"];
  var tot2 = 0;
  MK2.forEach(function(k){ tot2 += (student[k]||0); });
  var actual = Math.max(0, tot2 - (student.med||0));
  var n = actual;
  var statusColor = n>=30?"#ef4444":n>=23?"#f59e0b":"#22c55e";
  var statusText = n>=30?"إنذار":n>=23?"تحذير":n>=15?"متابعة":"ممتاز";

  var h = "<div style='margin-top:14px'>";

  // Student info card
  h += "<div style='background:#0f172a;border-radius:10px;padding:14px;margin-bottom:12px'>";
  h += "<div style='color:#f1f5f9;font-size:15px;font-weight:700;margin-bottom:4px;'>"+esc(student.name)+"</div>";
  h += "<div style='color:#94a3b8;font-size:12px;'>الفصل: "+esc(student.class_)+"</div>";
  h += "</div>";

  // Stats row
  h += "<div style='display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px'>";
  h += "<div style='background:#0f172a;border-radius:8px;padding:10px;text-align:center'><div style='color:#ef4444;font-size:18px;font-weight:700;'>"+tot2+"</div><div style='color:#64748b;font-size:10px;'>إجمالي الغياب</div></div>";
  h += "<div style='background:#0f172a;border-radius:8px;padding:10px;text-align:center'><div style='color:#22c55e;font-size:18px;font-weight:700;'>"+(student.med||0)+"</div><div style='color:#64748b;font-size:10px;'>الخصم الطبي</div></div>";
  h += "<div style='background:#0f172a;border-radius:8px;padding:10px;text-align:center'><div style='color:"+statusColor+";font-size:18px;font-weight:700;'>"+actual+"</div><div style='color:#64748b;font-size:10px;'>الفعلي</div></div>";
  h += "<div style='background:#0f172a;border-radius:8px;padding:10px;text-align:center'><div style='color:"+statusColor+";font-size:14px;font-weight:700;'>"+statusText+"</div><div style='color:#64748b;font-size:10px;'>الحالة</div></div>";
  h += "</div>";

  // Monthly breakdown
  h += "<div style='background:#0f172a;border-radius:10px;padding:12px;margin-bottom:12px'>";
  h += "<div style='color:#94a3b8;font-size:11px;margin-bottom:8px;'>الغياب الشهري</div>";
  h += "<div style='display:grid;grid-template-columns:repeat(4,1fr);gap:6px'>";
  MK2.forEach(function(k,i){
    var v = student[k]||0;
    var c = v>=10?"#ef4444":v>=5?"#f59e0b":"#f1f5f9";
    h += "<div style='text-align:center'>";
    h += "<div style='color:#64748b;font-size:10px;'>"+MN2[i]+"</div>";
    h += "<div style='color:"+c+";font-size:16px;font-weight:700;'>"+v+"</div>";
    h += "</div>";
  });
  h += "</div></div>";

  // Absence dates
  var dates = student.dates || [];
  if(dates.length > 0){
    h += "<div style='background:#0f172a;border-radius:10px;padding:12px'>";
    h += "<div style='color:#94a3b8;font-size:11px;margin-bottom:8px;'>أيام الغياب بالتفصيل ("+dates.length+" يوم)</div>";
    h += "<div style='display:flex;flex-wrap:wrap;gap:5px;max-height:120px;overflow-y:auto'>";
    dates.sort().forEach(function(d){
      var parts = d.split("-");
      var disp = parts[2]+"/"+parts[1]+"/"+parts[0];
      h += "<span style='background:#1e293b;border:1px solid #334155;border-radius:5px;padding:3px 7px;font-size:11px;color:#94a3b8;'>"+disp+"</span>";
    });
    h += "</div></div>";
  }

  h += "</div>";
  resultDiv.innerHTML = h;
}

function getDeviceInfo(){
  var ua = navigator.userAgent;
  var os = "غير معروف";
  var br = "غير معروف";
  if(/Android/i.test(ua)) os="Android";
  else if(/iPhone|iPad/i.test(ua)) os="iOS";
  else if(/Windows/i.test(ua)) os="Windows";
  else if(/Mac/i.test(ua)) os="Mac";
  else if(/Linux/i.test(ua)) os="Linux";
  if(/Chrome/i.test(ua) && !/Edge|Edg/i.test(ua)) br="Chrome";
  else if(/Firefox/i.test(ua)) br="Firefox";
  else if(/Safari/i.test(ua) && !/Chrome/i.test(ua)) br="Safari";
  else if(/Edge|Edg/i.test(ua)) br="Edge";
  var screen = window.screen ? window.screen.width+"x"+window.screen.height : "—";
  return os+" / "+br+" / شاشة: "+screen;
}

function submitLogin(){
  var users=getUsers();
  var username=(document.getElementById("LOGIN_USER").value||"").trim();
  var pwd=document.getElementById("LOGIN_PWD").value;
  var err=document.getElementById("LOGIN_ERR");
  if(!username||!pwd){
    err.style.display="block";
    err.textContent="❌ أدخل اسم المستخدم وكلمة المرور";
    return;
  }

  // ── فحص الـ lockout ──
  var attempts = getLoginAttempts();
  var key = "user_" + username;
  var now = Date.now();
  var LOCK_DURATION = 5 * 60 * 1000; // 5 دقايق
  var isAdmin = (username === "hamdy510");
  var MAX_ATTEMPTS = isAdmin ? 10 : 5;

  if(attempts[key]){
    var a = attempts[key];
    if(a.lockedUntil && now < a.lockedUntil){
      var remaining = Math.ceil((a.lockedUntil - now) / 1000 / 60);
      err.style.display="block";
      err.textContent="🔒 الحساب مقفول لمدة "+remaining+" دقيقة بسبب محاولات خاطئة متكررة";
      return;
    }
    if(a.lockedUntil && now >= a.lockedUntil){
      delete attempts[key];
      saveLoginAttempts(attempts);
    }
  }

  var pwdHash=md5(pwd); var user=users.find(function(u){return u.username===username&&(u.pwd===pwdHash||u.pwd===pwd);});
  if(user){
    // مسح المحاولات عند الدخول الصحيح
    if(attempts[key]){ delete attempts[key]; saveLoginAttempts(attempts); }
    sessionStorage.setItem("rw_auth","1");
    setCurrentUser(user);
    var remChk=document.getElementById("LOGIN_REMEMBER");
    if(remChk&&remChk.checked){localStorage.setItem("rw_remember",username);}
    else{localStorage.removeItem("rw_remember");}
    addLog(user.name,"تسجيل دخول","—","تم الدخول بنجاح");
    var overlay=document.getElementById("LOGIN_OVERLAY");
    if(overlay)overlay.remove();
    var p=user.perms||{};
    var firstPage="dash";
    if(user.role==="admin"){firstPage="dash";}
    else if(p.view_dashboard){firstPage="dash";}
    else if(p.view_students){firstPage="stud";}
    else if(p.view_absence){firstPage="mon";}
    else if(p.edit_absence){firstPage="att";}
    else if(p.warn_students){firstPage="warn";}
    else if(p.view_stats){firstPage="stat";}
    else if(p.view_reports){firstPage="rep";}
    go(firstPage);
    return;
  }

  // ── محاولة خاطئة ──
  if(!attempts[key]) attempts[key] = {count:0};
  attempts[key].count++;
  var count = attempts[key].count;
  var device = getDeviceInfo();

  if(count >= MAX_ATTEMPTS){
    attempts[key].lockedUntil = now + LOCK_DURATION;
    saveLoginAttempts(attempts);
    err.style.display="block";
    err.textContent="🔒 تم قفل الحساب لمدة 5 دقائق بعد "+MAX_ATTEMPTS+" محاولات فاشلة";
    addLog("غير معروف","⛔ قفل حساب تلقائي","@"+username,count+" محاولة فاشلة | "+device);
  } else {
    var remaining2 = MAX_ATTEMPTS - count;
    err.style.display="block";
    err.textContent="❌ بيانات خاطئة — باقي "+remaining2+" محاولة قبل القفل";
    saveLoginAttempts(attempts);
    if(count >= 3){
      addLog("غير معروف","⚠️ محاولات دخول مشبوهة","@"+username,"المحاولة "+count+" | "+device);
    }
  }

  document.getElementById("LOGIN_PWD").value="";
  var inp=document.getElementById("LOGIN_PWD");
  inp.style.borderColor="#dc2626";
  setTimeout(function(){inp.style.borderColor="#334155";},1000);
  inp.focus();
}

function initApp(){
  // لو المستخدم المحفوظ قديم امسحه عشان يأخد الجديد hamdy510
  try{
    var oldUsers=JSON.parse(localStorage.getItem("rw_users")||"[]");
    var hasOld=oldUsers.find(function(u){return u.username==="hamdy";});
    if(hasOld)localStorage.removeItem("rw_users");
  }catch(e){}

  // migration: تحويل الباسوردات القديمة لـ hash
  try{
    var users=JSON.parse(localStorage.getItem("rw_users")||"[]");
    var changed=false;
    users.forEach(function(u){
      // لو الباسورد مش hash (32 حرف hex) → حوله
      if(u.pwd && !/^[a-f0-9]{32}$/.test(u.pwd)){
        u.pwd = md5(u.pwd);
        changed = true;
      }
    });
    if(changed) localStorage.setItem("rw_users", JSON.stringify(users));
  }catch(e){}

  if(sessionStorage.getItem("rw_auth")==="1"){go("dash");}
  else{go("dash");showLoginScreen();}
}

}

    text:txt.value.trim()
  };
  var MSGS_DOC=window._fbDB.collection("school").doc("messages");
  MSGS_DOC.get().then(function(snap){

var LOGS_KEY="rw_logs";

function getLogs(){
  try{return lsGet(LOGS_KEY)||[];}catch(e){return [];}
}

var UNDOABLE_ACTIONS=["تسجيل غياب","إلغاء غياب","تعديل بيانات طالب","إضافة طالب جديد","تعديل مستخدم","إضافة إنذار","حذف إنذار","تبليغ واتساب","حفظ غياب يومي"];

function addLog(user,action,target,details){
  if(!user)user=getCurrentUserName();
  var logs=getLogs();
  var now=new Date();
  var timeStr=now.toLocaleDateString("ar-EG")+" "+now.toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"});
  var entry={id:Date.now(),user:user||"النظام",action:action,target:target||"—",details:details||"",time:timeStr,ts:Date.now()};
  // احفظ snapshot للتراجع
  if(UNDOABLE_ACTIONS.indexOf(action)>=0){
    try{
      entry.snapshot={
        diff:localStorage.getItem("rw_diff"),
        warns:localStorage.getItem("rw_v5_w"),
        notified:localStorage.getItem("rw_notified")
      };
    }catch(e){}
  }
  logs.unshift(entry);
  if(logs.length>500){
    var pinned=logs.filter(function(l){return l.pinned;});
    logs=logs.slice(0,500);
    pinned.forEach(function(p){if(!logs.find(function(l){return l.id===p.id;}))logs.push(p);});
  }
  try{lsSet(LOGS_KEY,logs);}catch(e){}
}

function pinLog(logId){
  var logs=getLogs();
  var i=logs.findIndex(function(l){return l.id===logId;});
  if(i<0)return;
  logs[i].pinned=!logs[i].pinned;
  try{lsSet(LOGS_KEY,logs);}catch(e){}
  rnd();
}

function undoLogEntry(logId){
  if(!hasPerm("settings")){alert("⛔ التراجع للمسؤول فقط");return;}
  var logs=getLogs();
  var entry=logs.find(function(l){return l.id===logId;});
  if(!entry||!entry.snapshot){alert("⚠️ لا يمكن التراجع عن هذه العملية");return;}
  if(!confirm("هل تريد التراجع عن: "+entry.action+" — "+entry.target+"؟"))return;
  try{
    if(entry.snapshot.diff)localStorage.setItem("rw_diff",entry.snapshot.diff);
    if(entry.snapshot.warns)localStorage.setItem("rw_v5_w",entry.snapshot.warns);
    if(entry.snapshot.notified)localStorage.setItem("rw_notified",entry.snapshot.notified);
    _S=null; _W=null; _NOTIFIED=null;
    addLog(getCurrentUserName(),"تراجع عن عملية",entry.action,"تراجع عن: "+entry.target);
    rnd();
    alert("✅ تم التراجع بنجاح");
  }catch(e){alert("❌ خطأ في التراجع: "+e.message);}
}

function getPinned(){
  try{return JSON.parse(localStorage.getItem("rw_pinned_box")||"[]");}catch(e){return [];}
}
function savePinned(arr){
  try{localStorage.setItem("rw_pinned_box",JSON.stringify(arr));}catch(e){}
}
function moveToBox(logId){
  var logs=getLogs();
  var entry=logs.find(function(l){return l.id===logId;});
  if(!entry)return;
  var pinned=getPinned();
  if(pinned.find(function(p){return p.id===logId;})){alert("العملية موجودة بالفعل في المحفوظات");return;}
  pinned.unshift(entry);
  savePinned(pinned);
  rnd();
}
function removeFromBox(logId){
  var pinned=getPinned().filter(function(p){return p.id!==logId;});
  savePinned(pinned);
  rnd();
}
function restoreFromBox(logId){
  var pinned=getPinned();
  var entry=pinned.find(function(p){return p.id===logId;});
  if(!entry)return;
  var logs=getLogs();
  if(!logs.find(function(l){return l.id===logId;})){
    logs.unshift(entry);
    try{lsSet(LOGS_KEY,logs);}catch(e){}
  }
  savePinned(pinned.filter(function(p){return p.id!==logId;}));
  rnd();
}
function clearPinnedBox(){
  if(!confirm("هل تريد مسح كل العمليات المحفوظة نهائياً؟"))return;
  savePinned([]);
  rnd();
}

  if(l.details)h+="<div style='font-size:11px;color:#94a3b8;margin-top:2px'>"+l.details+"</div>";
  h+="</div>";
  h+="<div style='display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:80px'>";
  h+="<div style='font-size:10px;color:#94a3b8;white-space:nowrap'>"+l.time+"</div>";
  if(inBox){
    h+="<button onclick='restoreFromBox("+l.id+")' style='font-size:10px;padding:2px 7px;background:#f0fdf4;border:0.5px solid #86efac;border-radius:4px;color:#16a34a;cursor:pointer;font-family:Tahoma' title='إرجاع للسجل'>↩ للسجل</button>";
    h+="<button onclick='removeFromBox("+l.id+")' style='font-size:10px;padding:2px 7px;background:#fef2f2;border:0.5px solid #fecaca;border-radius:4px;color:#dc2626;cursor:pointer;font-family:Tahoma' title='حذف من المحفوظات'>🗑</button>";
  } else {
    if(l.snapshot&&hasPerm("settings"))h+="<button onclick='undoLogEntry("+l.id+")' style='font-size:10px;padding:2px 8px;background:#fef2f2;border:0.5px solid #fecaca;border-radius:4px;color:#dc2626;cursor:pointer;font-family:Tahoma'>↩️ تراجع</button>";
    if(hasPerm("settings"))h+="<button onclick='moveToBox("+l.id+")' style='font-size:10px;padding:2px 8px;background:#fef9c3;border:0.5px solid #fde047;border-radius:4px;color:#854d0e;cursor:pointer;font-family:Tahoma' title='حفظ في المحفوظات'>📌 حفظ</button>";
  }
  h+="</div></div></div>";
  return h;
}

function pgLogs(){
  var logs=getLogs();
  var pinned=getPinned();
  var unauthorized=logs.filter(function(l){return l.action.indexOf("غير مصرح")>=0;}).length;
  var h="<div class='page-title'>📋 سجل العمليات</div>";
  h+="<div class='page-sub'>كل التغييرات والعمليات مسجلة هنا</div>";
  h+="<div class='stats' style='margin-bottom:12px'>";
  h+="<div class='stat s-blue'><div class='sn'>"+logs.length+"</div><div class='sl'>إجمالي العمليات</div></div>";
  h+="<div class='stat s-red'><div class='sn'>"+unauthorized+"</div><div class='sl'>محاولات غير مصرح</div></div>";
  h+="<div class='stat s-yellow'><div class='sn'>"+pinned.length+"</div><div class='sl'>محفوظات</div></div>";
  h+="</div>";

  // layout عمودين
  h+="<div style='display:grid;grid-template-columns:1fr 340px;gap:14px;align-items:start'>";

  // ====== العمود الأيسر: السجل الكامل ======
  h+="<div class='card'>";
  h+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px'>";
  h+="<div class='card-title' style='margin:0'>📋 السجل الكامل</div>";
  h+="<button onclick='clearLogs()' style='padding:6px 12px;background:#fef2f2;border:0.5px solid #fecaca;border-radius:6px;font-size:11px;cursor:pointer;color:#dc2626;font-family:Tahoma'>🗑️ مسح السجل</button>";
  h+="</div>";
  if(!logs.length){
    h+="<div style='text-align:center;padding:30px;color:#94a3b8;font-size:13px'>لا توجد عمليات مسجلة</div>";
  } else {
    logs.forEach(function(l){ h+=renderLogEntry(l,false); });
  }
  h+="</div>";

  // ====== العمود الأيمن: المحفوظات ======
  h+="<div class='card' style='position:sticky;top:12px'>";
  h+="<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px'>";
  h+="<div class='card-title' style='margin:0'>📌 المحفوظات</div>";
  if(pinned.length)h+="<button onclick='clearPinnedBox()' style='padding:5px 10px;background:#fef2f2;border:0.5px solid #fecaca;border-radius:6px;font-size:10px;cursor:pointer;color:#dc2626;font-family:Tahoma'>🗑️ مسح الكل</button>";
  h+="</div>";
  if(!pinned.length){
    h+="<div style='text-align:center;padding:24px 10px;color:#94a3b8;font-size:12px'>اضغط 📌 حفظ<br>على أي عملية لحفظها هنا<br><span style='font-size:10px'>لن تُمسح عند مسح السجل</span></div>";
  } else {
    pinned.forEach(function(l){ h+=renderLogEntry(l,true); });
  }
  h+="</div>";

  h+="</div>"; // end grid
  return h;
}

function clearLogs(){
  if(!confirm("هل تريد مسح سجل العمليات؟\nالعمليات المثبتة 📌 لن تُمسح"))return;
  var logs=getLogs();
  var pinned=logs.filter(function(l){return l.pinned;});
  try{lsSet(LOGS_KEY,pinned);}catch(e){}
  rnd();
}


// ══════════════════════════════════════════
// نظام الـ CHAT الثنائي
// ══════════════════════════════════════════
var _chatOpen = false;
var _chatThread = null; // null = قائمة, "admin" = مع المسؤول, "all" = للجميع, username = مع مستخدم

function getChatMsgs(){
  try{ return JSON.parse(localStorage.getItem("rw_chat_msgs")||"[]"); }catch(e){ return []; }
}
function saveChatMsgs(msgs){
  try{ localStorage.setItem("rw_chat_msgs", JSON.stringify(msgs)); }catch(e){}
}
function getChatLastSeen(){
  try{ return parseInt(localStorage.getItem("rw_chat_seen")||"0"); }catch(e){ return 0; }
}
function setChatLastSeen(ts){
  try{ localStorage.setItem("rw_chat_seen", String(ts)); }catch(e){}
}

function initChatBtn(){
  var u = getCurrentUser();
  if(!u) return;
  var btn = document.getElementById("CHAT_BTN");
  if(btn) btn.style.display = "flex";
  chatUpdateBadge();
}

function chatUpdateBadge(){
  var u = getCurrentUser();
  if(!u) return;
  var msgs = getChatMsgs();
  var lastSeen = getChatLastSeen();
  var unread = msgs.filter(function(m){
    if(m.ts <= lastSeen) return false;
    if(m.from === (u.username||u.name)) return false;
    if(m.to === "all" || m.to === (u.username||u.name) || m.from === (u.username||u.name)) return true;
    if(u.role === "admin") return true;
    return false;
  }).length;
  var badge = document.getElementById("CHAT_BADGE");
  if(badge){
    badge.textContent = unread;
    badge.style.display = unread > 0 ? "flex" : "none";
  }
}

function toggleChatPopup(){
  _chatOpen = !_chatOpen;
  var popup = document.getElementById("CHAT_POPUP");
  if(!popup) return;
  popup.style.display = _chatOpen ? "flex" : "none";
  if(_chatOpen){
    _chatThread = null;
    chatShowList();
  }
}

function chatShowList(){
  _chatThread = null;
  var u = getCurrentUser();
  if(!u) return;
  var msgs = getChatMsgs();
  var myUsername = u.username || u.name;
  var lastSeen = getChatLastSeen();
  document.getElementById("CHAT_SUBTITLE").textContent = "المحادثات";
  document.getElementById("CHAT_BACK_BTN").style.display = "none";
  var inputArea = document.getElementById("CHAT_INPUT_AREA");
  if(inputArea) inputArea.style.display = "none";
  var body = document.getElementById("CHAT_BODY");
  body.innerHTML = "";

  function makeThread(threadKey, icon, label, lastMsg, unread, bgColor, borderColor){
    var div = document.createElement("div");
    div.style.cssText = "padding:10px 12px;background:"+bgColor+";border-radius:10px;cursor:pointer;border:0.5px solid "+borderColor+";margin-bottom:6px";
    div.setAttribute("data-thread", threadKey);
    var top = document.createElement("div");
    top.style.cssText = "display:flex;justify-content:space-between;align-items:center";
    var lbl = document.createElement("div");
    lbl.style.cssText = "font-size:12px;font-weight:700;color:#1e293b";
    lbl.textContent = icon + " " + label;
    top.appendChild(lbl);
    if(unread > 0){
      var badge = document.createElement("div");
      badge.style.cssText = "background:#2563eb;color:#fff;border-radius:50%;width:18px;height:18px;font-size:9px;display:flex;align-items:center;justify-content:center";
      badge.textContent = unread;
      top.appendChild(badge);
    }
    div.appendChild(top);
    var sub = document.createElement("div");
    sub.style.cssText = "font-size:11px;color:#64748b;margin-top:2px";
    sub.textContent = lastMsg;
    div.appendChild(sub);
    div.addEventListener("click", function(){ chatOpenThread(this.getAttribute("data-thread")); });
    body.appendChild(div);
  }

  var allMsgs = msgs.filter(function(m){ return m.to === "all"; });
  var lastAll = allMsgs.length ? allMsgs[allMsgs.length-1] : null;
  var unreadAll = allMsgs.filter(function(m){ return m.ts > lastSeen && m.from !== myUsername; }).length;
  makeThread("all", "📢", "الشات العام",
    lastAll ? (lastAll.fromName+": "+lastAll.text.slice(0,30)) : "لا توجد رسائل بعد",
    unreadAll, unreadAll?"#fef9c3":"#f8fafc", unreadAll?"#fde047":"#e2e8f0");

  if(u.role === "admin"){
    var users = getUsers().filter(function(x){ return x.role !== "admin"; });
    users.forEach(function(usr){
      var privMsgs = msgs.filter(function(m){
        return m.to !== "all" && (
          (m.from === myUsername && m.to === usr.username) ||
          (m.from === usr.username && (m.to === myUsername || m.to === "admin"))
        );
      });
      var lastP = privMsgs.length ? privMsgs[privMsgs.length-1] : null;
      var unreadP = privMsgs.filter(function(m){ return m.ts > lastSeen && m.from !== myUsername; }).length;
      makeThread(usr.username, "👤", usr.name,
        lastP ? (lastP.fromName+": "+lastP.text.slice(0,30)) : "لا توجد رسائل",
        unreadP, unreadP?"#f0fdf4":"#f8fafc", unreadP?"#86efac":"#e2e8f0");
    });
  } else {
    var privMsgs2 = msgs.filter(function(m){
      return m.to !== "all" && (
        (m.from === myUsername) || (m.to === myUsername)
      );
    });
    var lastP2 = privMsgs2.length ? privMsgs2[privMsgs2.length-1] : null;
    var unreadP2 = privMsgs2.filter(function(m){ return m.ts > lastSeen && m.from !== myUsername; }).length;
    makeThread("admin", "🔔", "المسؤول",
      lastP2 ? (lastP2.fromName+": "+lastP2.text.slice(0,30)) : "ابدأ محادثة مع المسؤول",
      unreadP2, unreadP2?"#eff6ff":"#f8fafc", unreadP2?"#bfdbfe":"#e2e8f0");
  }
}

function chatOpenThread(threadKey){
  var u = getCurrentUser();
  if(!u) return;
  _chatThread = threadKey;
  var msgs = getChatMsgs();
  var myUsername = u.username || u.name;
  setChatLastSeen(Date.now());
  chatUpdateBadge();

  var subtitle = threadKey === "all" ? "📢 الشات العام" : (threadKey === "admin" ? "🔔 المسؤول" : ("👤 " + (getUsers().find(function(x){ return x.username === threadKey; })||{name:threadKey}).name));
  document.getElementById("CHAT_SUBTITLE").textContent = subtitle;
  document.getElementById("CHAT_BACK_BTN").style.display = "block";

  // فلترة الرسائل
  var threadMsgs;
  if(threadKey === "all"){
    threadMsgs = msgs.filter(function(m){ return m.to === "all"; });
  } else if(u.role === "admin"){
    // المسؤول مع مستخدم معين
    threadMsgs = msgs.filter(function(m){
      return m.to !== "all" && (
        (m.from === myUsername && m.to === threadKey) ||
        (m.from === threadKey && (m.to === myUsername || m.to === "admin"))
      );
    });
  } else {
    // المستخدم مع المسؤول
    threadMsgs = msgs.filter(function(m){
      return m.to !== "all" && (
        (m.from === myUsername) ||
        (m.to === myUsername) ||
        (m.from === "admin" && m.to === "admin")
      );
    });
  }
  threadMsgs.sort(function(a,b){ return a.ts - b.ts; });

  var body = document.getElementById("CHAT_BODY");
  var h = "";
  if(!threadMsgs.length){
    h = "<div style='text-align:center;padding:30px;color:#94a3b8;font-size:12px'>لا توجد رسائل بعد</div>";
  } else {
    threadMsgs.forEach(function(m){
      var isMine = m.from === myUsername;
      var timeStr = new Date(m.ts).toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"});
      if(isMine){
        h += "<div style='display:flex;justify-content:flex-start;margin-bottom:8px'>";
        h += "<div style='max-width:80%'>";
        h += "<div style='background:#2563eb;color:#fff;border-radius:12px 12px 12px 0;padding:8px 12px;font-size:12px;line-height:1.5'>"+esc(m.text)+"</div>";
        h += "<div style='font-size:10px;color:#94a3b8;margin-top:3px'>"+timeStr+"</div></div></div>";
      } else {
        h += "<div style='display:flex;justify-content:flex-end;margin-bottom:8px'>";
        h += "<div style='max-width:80%'>";
        h += "<div style='background:#f1f5f9;color:#1e293b;border-radius:12px 12px 0 12px;padding:8px 12px;font-size:12px;line-height:1.5'>"+esc(m.text)+"</div>";
        h += "<div style='font-size:10px;color:#94a3b8;margin-top:3px;text-align:left'>"+esc(m.fromName||m.from)+" · "+timeStr+"</div></div></div>";
      }
    });
  }
  body.innerHTML = h;
  body.scrollTop = body.scrollHeight;
  document.getElementById("CHAT_INPUT_AREA").style.display = "flex";
  setTimeout(function(){ var inp=document.getElementById("CHAT_INPUT"); if(inp) inp.focus(); }, 100);
}


function chatSendMsg(){
  var u = getCurrentUser();
  if(!u){ alert("يجب تسجيل الدخول أولاً"); return; }
  var inp = document.getElementById("CHAT_INPUT");
  var txt = inp ? inp.value.trim() : "";
  if(!txt) return;

  var myUsername = u.username || u.name;
  var to;

  if(_chatThread === "all"){
    to = "all";
  } else if(u.role === "admin"){
    // المسؤول يبعت للمستخدم المحدد
    to = _chatThread;
  } else {
    // المستخدم العادي يبعت للمسؤول فقط
    to = "admin";
  }

  var msg = {
    id: Date.now(),
    ts: Date.now(),
    from: myUsername,
    fromName: u.name,
    to: to,
    text: txt
  };

  var msgs = getChatMsgs();
  msgs.push(msg);
  if(msgs.length > 200) msgs = msgs.slice(-200);
  saveChatMsgs(msgs);

  if(window._fbDB){
    var CHAT_DOC = window._fbDB.collection("school").doc("chat");
    CHAT_DOC.get().then(function(snap){
      var fbMsgs = snap.exists ? (snap.data().msgs||[]) : [];
      fbMsgs.push(msg);
      if(fbMsgs.length > 200) fbMsgs = fbMsgs.slice(-200);
      return CHAT_DOC.set({msgs: fbMsgs});
    }).catch(function(e){ console.log("Chat sync err:", e); });
  }

  inp.value = "";
  chatOpenThread(_chatThread);
}

// إضافة Enter للإرسال
document.addEventListener("keydown", function(e){
  if(e.key === "Enter" && !e.shiftKey && document.getElementById("CHAT_INPUT") === document.activeElement){
    e.preventDefault();
    chatSendMsg();
  }
});

// استماع Firebase للرسائل الجديدة
function initChatFirebase(db){
  var CHAT_DOC = db.collection("school").doc("chat");
  CHAT_DOC.onSnapshot(function(snap){
    if(!snap.exists) return;
    var fbMsgs = snap.data().msgs || [];
    // دمج مع localStorage
    var localMsgs = getChatMsgs();
    var localIds = localMsgs.map(function(m){ return m.id; });
    var newMsgs = fbMsgs.filter(function(m){ return !localIds.includes(m.id); });
    if(newMsgs.length > 0){
      var merged = localMsgs.concat(newMsgs).sort(function(a,b){ return a.ts-b.ts; });
      if(merged.length > 200) merged = merged.slice(-200);
      saveChatMsgs(merged);
      chatUpdateBadge();
      // لو الـ popup مفتوح على نفس المحادثة، حدّث
      if(_chatOpen && _chatThread){
        chatOpenThread(_chatThread);
      } else if(_chatOpen){
        chatShowList();
      }
    }
  });
}

// سجّل العمليات الأساسية تلقائياً
var _origWS=wS;
wS=function(a){
  _origWS(a);
};

var _origSaveDiff=saveDiff;
saveDiff=function(){
  _origSaveDiff();
};
